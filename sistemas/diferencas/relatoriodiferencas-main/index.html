<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Relatório de Diferenças</title>

    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="app.js" defer></script>
</head>

<body>

<header class="topbar">
    <div class="brand">
        <img src="assets/logo.png" alt="Logo" class="logo" />
        <h1>Relatório de Diferenças</h1>
    </div>
    <button id="btnAbrirRelatorios" class="btn outline">Relatórios</button>
</header>

<main class="container">
    <section id="appSection">

        <div class="grid">

            <!-- ✅ RESUMO DO RECEBEDOR (NÃO ALTERADO) -->
            <aside class="card admin-only">
                <div class="flex-between">
                    <h3>Resumo do Recebedor</h3>
                    <button id="btnToggleResumo" class="btn outline">Esconder/Exibir</button>
                </div>

                <div id="resumoWrap" class="collapsed">
                    <div class="row">
                        <label>Matrícula</label>
                        <select id="selectMatriculas"></select>
                    </div>

                    <div class="row">
                        <label>Mês</label>
                        <input id="mesResumo" type="month" />
                        <button id="btnCarregarResumo" class="btn">Carregar</button>
                    </div>

                    <div id="resumoDados" class="stats">
                        <div><span>Total Folha</span> <strong id="resumoTotalFolha">R$ 0,00</strong></div>
                        <div><span>Saldo</span> <strong id="resumoSaldo">R$ 0,00</strong></div>
                        <div><span>Situação</span> <strong id="resumoSituacao">-</strong></div>

                        <div class="filter-row">
                            <label>Ver apenas:</label>
                            <select id="filtroPositivosNegativos">
                                <option value="todos">Todos</option>
                                <option value="positivos">Somente Sobra</option>
                                <option value="negativos">Somente Falta</option>
                            </select>
                        </div>

                        <div id="resumoLista" class="resumo-lista"></div>
                    </div>
                </div>
            </aside>

            <!-- ✅ GERAR RELATÓRIO (NÃO ALTERADO) -->
            <aside class="card">
                <h3>Gerar Relatório</h3>

                <div id="gerarRelatorioForm" class="admin-only" hidden>
                    <div class="row"><label>Matrícula</label><select id="matriculaForm"></select></div>
                    <div class="row"><label>Data</label><input id="dataCaixa" type="date" /></div>
                    <div class="row"><label>Folha</label><input id="valorFolha" type="number" step="0.01" /></div>
                    <div class="row"><label>Dinheiro</label><input id="valorDinheiro" type="number" step="0.01" /></div>
                    <div class="row"><label>Sobra/Falta</label><input id="sobraFalta" type="text" disabled /></div>
                    <div class="row"><label>Abastecimento</label><input id="abastecimento" type="number" /></div>
                    <div class="row"><label>Observação</label><textarea id="observacao"></textarea></div>

                    <button id="btnSalvarRelatorio" class="btn primary">Salvar</button>
                </div>

                <div class="user-only" id="infoUserOnly" hidden>
                    <p>Os relatórios são criados pelos administradores.</p>
                </div>
            </aside>

        </div>

    </section>
</main>

<footer class="footer"></footer>

<!-- ✅ MODAL PRINCIPAL DOS RELATÓRIOS -->
<dialog id="modalRelatorios" class="modal">
    <form method="dialog" class="modal-content">
        <!-- Cabeçalho com botão de fechar à esquerda -->
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:10px;">
            <button id="btnFecharModalRelatorios" type="button" class="btn outline" style="margin-right:8px;">✕</button>
            <h3 style="margin:0;">Relatórios</h3>
        </div>

        <div class="row admin-only">
            <label>Matrícula</label>
            <select id="filtroMatricula">
                <option value="">Selecione</option>
            </select>
        </div>

        <div class="row">
            <label>Data</label>
            <input id="filtroDataGlobal" type="date" />
            <button id="btnFiltrarPorData" class="btn outline" type="button">Filtrar</button>
        </div>

        <div id="listaRelatoriosModal" class="lista"></div>

        <!-- Mantive o botão de fechar no rodapé também (opcional) -->
        <div class="row" style="justify-content:flex-end; margin-top:12px;">
            <button class="btn" type="submit">Fechar</button>
        </div>
    </form>
</dialog>

<!-- ✅ MODAL FLUTUANTE DE RESUMO DO RELATÓRIO -->
<dialog id="modalResumo" class="modal">
    <div class="modal-content">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:10px;">
            <!-- botão Fechar do resumo permanece na esquerda do título do resumo -->
            <button id="btnFecharResumo" class="btn" type="button" style="margin-right:8px;">✕</button>
            <h3 style="margin:0;">Resumo do Relatório</h3>
        </div>

        <div id="conteudoResumo"></div>

        <!-- removi o botão duplicado ao final porque já há o botão no header acima -->
    </div>
</dialog>

<!-- ✅ MODAL DE PÓS-CONFERÊNCIA -->
<dialog id="posModal" class="modal">
    <form method="dialog" class="modal-content">
        <h3>Pós-Conferência</h3>

        <textarea id="posTexto" rows="6"></textarea>

        <div class="row">
            <button id="btnSalvarPos" class="btn primary admin-only" type="button">Salvar</button>
            <button id="btnFecharPos" class="btn" type="submit">Fechar</button>
        </div>
    </form>
</dialog>

<!-- Pequeno script inline que aplica 3 correções solicitadas
     - reseta filtro de matrícula ao abrir modalRelatorios
     - adiciona botão de fechar no topo do modalRelatorios
     - garante que fechar o resumo não feche permanentemente o modalRelatorios
-->
<script>
document.addEventListener('DOMContentLoaded', () => {
  const btnAbrir = document.getElementById('btnAbrirRelatorios');
  const modalRel = document.getElementById('modalRelatorios');
  const filtroMat = document.getElementById('filtroMatricula');
  const btnFecharModal = document.getElementById('btnFecharModalRelatorios');

  const modalResumo = document.getElementById('modalResumo');
  const btnFecharResumo = document.getElementById('btnFecharResumo');

  // Ao abrir Relatórios: garantir que filtro volte para "Selecione"
  if (btnAbrir) {
    btnAbrir.addEventListener('click', async (e) => {
      // se tiver um select de filtro, resetar
      if (filtroMat) {
        filtroMat.value = "";
        // força selecionar 1ª opção (caso haja manipulação posterior)
        filtroMat.selectedIndex = 0;
      }
      // abre modal (app.js também pode chamar carregarRelatoriosModal; aqui só cuida do comportamento)
      try { modalRel.showModal(); } catch (err) { /* ignore */ }
    });
  }

  // Botão de fechar no topo do modalRelatorios
  if (btnFecharModal) {
    btnFecharModal.addEventListener('click', () => {
      if (modalRel) modalRel.close();
    });
  }

  // Garantir que ao fechar o resumo o modalRelatorios NÃO seja fechado.
  // Algumas implementações podem fechar outro dialog por acidente — então reabrimos se necessário.
  if (btnFecharResumo) {
    btnFecharResumo.addEventListener('click', () => {
      const relWasOpen = modalRel && modalRel.open;
      try { modalResumo.close(); } catch (err) { /* ignore */ }
      // se o modalRel estava aberto e foi fechado acidentalmente, reabra
      setTimeout(() => {
        if (relWasOpen && modalRel && !modalRel.open) {
          try { modalRel.showModal(); } catch (err) { /* ignore */ }
        }
      }, 120);
    });
  }

  // Segurança: quando modalRel for aberto por outros scripts, também resetar o filtro
  // (isso garante comportamento consistente se app.js abrir o modal)
  const observer = new MutationObserver(() => {
    if (modalRel && modalRel.open && filtroMat) {
      filtroMat.value = "";
      filtroMat.selectedIndex = 0;
    }
  });
  if (modalRel) observer.observe(modalRel, { attributes: true, attributeFilter: ['open'] });
});
</script>

</body>
</html>
